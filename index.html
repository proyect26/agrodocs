<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroDocs - Gestión de Etiquetas</title>
  </head>
  <body>
    <!-- Refractive Glass Distortion Filter for visionOS Liquid Glass -->
    <svg width="0" height="0" style="position: absolute; pointer-events: none;">
      <defs>
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence 
            type="fractalNoise" 
            baseFrequency="0.006 0.006"
            numOctaves="2" 
            seed="92" 
            result="noise" 
          />
          <feGaussianBlur 
            in="noise" 
            stdDeviation="2" 
            result="blurred" 
          />
          <feDisplacementMap 
            in="SourceGraphic" 
            in2="blurred" 
            scale="45"
            xChannelSelector="R" 
            yChannelSelector="G" 
          />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
